name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  actionlint:
    name: actionlint (workflow YAML 検証)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  fix128-gpu-matrix:
    name: Fix128 GPU (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy

      - name: Install Vulkan / Mesa (Linux only — enables lavapipe software adapter)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            vulkan-tools \
            libvulkan1 \
            libvulkan-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-fix128-${{ hashFiles('Cargo.toml') }}

      - name: Stub sibling ALICE-* path deps (CI lacks sibling checkouts)
        shell: bash
        run: |
          set -euo pipefail
          # Cargo.toml declares four `path = "../ALICE-XX"` deps for
          # local development. CI runners only clone this repo, so
          # `cargo metadata` needs bare-minimum sibling crates on
          # disk. The stubs export no items — `--features
          # fix128-arithmetic` does not touch any of them at compile
          # time; they exist purely to satisfy the workspace resolver.
          declare -A crates=(
            ["ALICE-ML"]="alice-ml"
            ["ALICE-Physics"]="alice-physics"
            ["ALICE-SDF"]="alice-sdf"
            ["ALICE-DB"]="alice-db"
          )
          for dir in "${!crates[@]}"; do
            name="${crates[$dir]}"
            mkdir -p "../${dir}/src"
            cat > "../${dir}/Cargo.toml" <<EOF
          [package]
          name = "${name}"
          version = "0.0.0"
          edition = "2021"

          [lib]
          path = "src/lib.rs"

          [features]
          default = []
          std = []
          gpu-solver-bridge = []
          EOF
            printf '' > "../${dir}/src/lib.rs"
          done

      - name: Build (fix128-arithmetic)
        run: cargo build --lib --features fix128-arithmetic

      - name: Test — Fix128 CPU reference (always runs, no GPU dep)
        run: cargo test --lib --features fix128-arithmetic fix128::tests::fix128_gpu_
        # 11 CPU-only fixture tests (const / from_raw / add / sub / mul).

      - name: Test — WGSL shader source symbol coverage (always runs, no GPU dep)
        run: cargo test --lib --features fix128-arithmetic fix128::tests::wgsl_
        # 4 shader-source presence tests + naga compile checks (compile
        # tests skip themselves when no adapter is available).

      - name: Test — Fix128 GPU dispatch (all fix128 tests, GPU tests self-skip on no-adapter)
        run: cargo test --lib --features fix128-arithmetic fix128 -- --nocapture
        # The wgpu_* tests early-return on `GpuDevice::new()` failure,
        # so this step passes even on runners where no adapter is
        # exposed. When an adapter is available (Metal on macos-latest,
        # lavapipe on ubuntu-latest, WARP on windows-latest) the same
        # tests exercise the full GPU dispatch path and check
        # bit-exact equivalence with the CPU reference.

