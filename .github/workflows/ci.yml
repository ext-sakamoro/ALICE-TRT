name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  actionlint:
    name: actionlint (workflow YAML 検証)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  fix128-gpu-matrix:
    name: Fix128 GPU (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy

      - name: Install Vulkan / Mesa (Linux only — enables lavapipe software adapter)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            vulkan-tools \
            libvulkan1 \
            libvulkan-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-fix128-${{ hashFiles('Cargo.toml') }}

      - name: Clone ALICE-ML (unconditional path dep used by src/weights.rs)
        shell: bash
        run: |
          set -euo pipefail
          cd ..
          git clone --depth 1 https://github.com/ext-sakamoro/ALICE-ML.git

      - name: Strip optional path deps from Cargo.toml (CI does not need them)
        shell: bash
        run: |
          set -euo pipefail
          # `alice-physics` / `alice-sdf` / `alice-db` are declared as
          # `path = "../ALICE-XX", optional = true` for local
          # development. Each pulls a transitive tree of path deps
          # (alice-db → alice-zip → ...) that CI cannot reasonably
          # clone. Since `--features fix128-arithmetic` alone does
          # not activate any of these three, we strip their declarations
          # from Cargo.toml before build. The GPU matrix job is
          # scoped to fix128 tests, so this narrows the CI surface
          # rather than the tested surface.
          #
          # `sed -i.bak` is portable across BSD (macOS) and GNU (Linux).
          # Remove the three optional declaration lines.
          sed -i.bak '/^alice-physics = {/d; /^alice-sdf = {/d; /^alice-db = {/d' Cargo.toml
          # Feature entries that reference the stripped crates must
          # also go, otherwise cargo will complain about unknown deps.
          sed -i.bak '/^physics = \["dep:alice-physics"/d' Cargo.toml
          sed -i.bak '/^sdf = \["dep:alice-sdf"/d' Cargo.toml
          sed -i.bak '/^db = \["dep:alice-db"/d' Cargo.toml
          sed -i.bak '/^physics-solver = /d' Cargo.toml
          rm -f Cargo.toml.bak
          echo "--- stripped Cargo.toml [dependencies] ---"
          grep -E "^(alice-|\[)" Cargo.toml || true

      - name: Build (fix128-arithmetic)
        run: cargo build --lib --features fix128-arithmetic

      - name: Test — Fix128 CPU reference (always runs, no GPU dep)
        run: cargo test --lib --features fix128-arithmetic fix128::tests::fix128_gpu_
        # 11 CPU-only fixture tests (const / from_raw / add / sub / mul).

      - name: Test — WGSL shader source symbol coverage (always runs, no GPU dep)
        run: cargo test --lib --features fix128-arithmetic fix128::tests::wgsl_
        # 4 shader-source presence tests + naga compile checks (compile
        # tests skip themselves when no adapter is available).

      - name: Test — Fix128 GPU dispatch (all fix128 tests, GPU tests self-skip on no-adapter)
        run: cargo test --lib --features fix128-arithmetic fix128 -- --nocapture
        # The wgpu_* tests early-return on `GpuDevice::new()` failure,
        # so this step passes even on runners where no adapter is
        # exposed. When an adapter is available (Metal on macos-latest,
        # lavapipe on ubuntu-latest, WARP on windows-latest) the same
        # tests exercise the full GPU dispatch path and check
        # bit-exact equivalence with the CPU reference.

